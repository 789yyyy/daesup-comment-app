<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대나무숲</title>
  <meta name="theme-color" content="#2b7cff" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <div class="logo-badge">대숲</div>
        <div class="hero-actions">
          <button id="themeToggle" class="ghost-btn" type="button" aria-label="다크모드 전환">🌙</button>
          <button id="adminToggle" class="ghost-btn" type="button">관리자</button>
        </div>
      </div>
      <p class="eyebrow">WAVY anonymous board</p>
      <h1 id="appTitle">대나무숲</h1>
      <p id="appSubtitle" class="subtitle">익명으로 남긴 속마음 · 건의 · 칭찬</p>
      <div id="notice" class="notice">서로 불편하지 않게, 선 넘는 내용은 운영진이 정리할 수 있어요.</div>
    </header>

    <section id="adminPanel" class="panel admin-panel hidden" aria-label="관리자 패널">
      <div class="panel-header">
        <div>
          <p class="eyebrow">admin mode</p>
          <h2>관리자 설정</h2>
        </div>
        <button id="closeAdmin" class="ghost-btn" type="button">닫기</button>
      </div>

      <div id="adminLoginBox" class="admin-login-box">
        <label class="field">
          <span>관리자 PIN</span>
          <input id="adminPin" type="password" placeholder="관리자 비밀번호 입력" autocomplete="current-password" />
        </label>
        <div class="row gap wrap admin-pin-actions">
          <button id="adminRefresh" class="secondary-btn" type="button">관리자 로그인</button>
        </div>
      </div>

      <div id="adminTools" class="admin-grid hidden">
        <form id="settingsForm" class="mini-card">
          <h3>문구 바꾸기</h3>
          <label class="field"><span>제목</span><input id="settingTitle" type="text" /></label>
          <label class="field"><span>설명</span><input id="settingSubtitle" type="text" /></label>
          <label class="field"><span>공지 문구</span><textarea id="settingNotice" rows="3"></textarea></label>
          <button class="primary-btn" type="submit">문구 저장</button>
        </form>

        <div class="mini-card">
          <h3>구글시트 연동</h3>
          <p id="sheetSyncStatus" class="sync-status help"> 연동 상태 확인 중...</p>
          <button id="syncNow" class="secondary-btn" type="button">구글시트 반영하기</button>
        </div>

        <div class="mini-card">
          <h3>숨긴 글</h3>
          <p class="help">숨긴 글을 확인하고 다시 복원할 수 있어요.</p>
          <button id="showHiddenPosts" class="secondary-btn" type="button">숨긴 글 보기</button>
        </div>

        <div class="mini-card">
          <h3>숨긴 댓글</h3>
          <p class="help">숨긴 댓글을 확인하고 다시 복원할 수 있어요.</p>
          <button id="showHiddenComments" class="secondary-btn" type="button">숨긴 댓글 보기</button>
        </div>
      </div>
    </section>

    <section class="toolbar panel">
      <div class="toolbar-actions">
        <button id="writeBtn" class="primary-btn" type="button">글쓰기</button>
        <button id="refreshBtn" class="secondary-btn" type="button">새로고침</button>
      </div>
      <div class="toolbar-filters">
        <label class="field search-type-field">
          <span>검색 기준</span>
          <select id="searchType">
            <option value="content">내용</option>
            <option value="nickname">닉네임</option>
          </select>
        </label>
        <label class="field search-field">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="내용 검색" />
        </label>
        <label class="field category-field">
          <span>카테고리</span>
          <select id="categoryFilter">
            <option value="all">전체</option>
          </select>
        </label>
      </div>
    </section>

    <main>
      <div id="status" class="status">불러오는 중...</div>
      <div id="postList" class="post-list"></div>
    </main>
  </div>

  <template id="postTemplate">
    <article class="post-card">
      <div class="post-meta">
        <div class="post-left-meta">
          <span class="chip category"></span>
          <span class="post-nickname"></span>
        </div>
        <span class="date"></span>
      </div>
      <p class="post-content"></p>
      <div class="comment-count"></div>
      <div class="comments"></div>
      <form class="comment-form">
        <input name="nickname" type="text" placeholder="닉네임" maxlength="20" />
        <input name="content" type="text" placeholder="내용" maxlength="600" required />
        <button type="submit">댓글</button>
      </form>
      <button class="delete-post danger-text hidden" type="button">글 숨김</button>
    </article>
  </template>

  <script src="/app.js" type="module"></script>
</body>
</html>
